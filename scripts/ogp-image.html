<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #080d18;
    color: #e6edf6;
    font-family: "Yu Gothic", "Meiryo", "Hiragino Kaku Gothic ProN", sans-serif;
    position: relative;
    overflow: hidden;
  }
  #globe { position: absolute; right: -40px; top: 15px; }
  .glow {
    position: absolute; right: 40px; top: 120px;
    width: 520px; height: 420px;
    background: radial-gradient(circle, rgba(143,212,184,0.10) 0%, rgba(8,13,24,0) 65%);
  }
  .wrap {
    position: absolute; left: 84px; top: 0; height: 630px;
    display: flex; flex-direction: column; justify-content: center;
    gap: 26px; z-index: 2;
  }
  .brand {
    font-size: 20px; letter-spacing: 0.32em; color: #8fd4b8; font-weight: 700;
  }
  h1 { font-size: 76px; font-weight: 700; letter-spacing: 0.02em; line-height: 1.1; }
  .lead {
    font-size: 34px; color: #e6edf6; font-weight: 500; letter-spacing: 0.01em;
  }
  .lead .accent { color: #8fd4b8; }
  .sub { font-size: 21px; color: #8ea0bd; line-height: 1.7; max-width: 560px; }
  .foot {
    position: absolute; left: 84px; bottom: 54px;
    display: flex; align-items: center; gap: 18px; z-index: 2;
  }
  .url {
    font-size: 22px; color: #e6edf6; letter-spacing: 0.04em;
    border: 1px solid #1c2942; background: #0d1526;
    padding: 9px 18px; border-radius: 9px;
  }
  .by { font-size: 19px; color: #8ea0bd; }
  .by b { color: #8fd4b8; font-weight: 700; }
  .rule {
    position: absolute; left: 0; top: 0; width: 9px; height: 630px; z-index: 5;
    background: linear-gradient(180deg, #8fd4b8 0%, #f0b95a 100%);
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="rule"></div>
  <div class="glow"></div>
  <canvas id="globe" width="600" height="600"></canvas>

  <div class="wrap">
    <div class="brand">TOIKA EXPORT NAVIGATOR</div>
    <h1>農産物輸出ナビ</h1>
    <div class="lead">調べる<span class="accent">数ヶ月</span>を、確かめる<span class="accent">数分</span>に。</div>
    <div class="sub">品目と国を選ぶだけ。輸出の可否・ハードル・手続きの段取りが数分でわかる無料サイト。</div>
  </div>

  <div class="foot">
    <div class="url">navi.toika.jp</div>
    <div class="by">by <b>Toika</b></div>
  </div>

<script>
const c = document.getElementById('globe');
const ctx = c.getContext('2d');
const CX = 300, CY = 300, R = 250;
const tilt = -0.24;          // 傾き
const rot = -2.44;           // 経度回転（-160°：日本を左、太平洋を正面、米国を右端に）

function project(latDeg, lngDeg) {
  const lat = latDeg * Math.PI / 180;
  const lng = (lngDeg * Math.PI / 180) + rot;
  let x = Math.cos(lat) * Math.sin(lng);
  let y = Math.sin(lat);
  let z = Math.cos(lat) * Math.cos(lng);
  const y2 = y * Math.cos(tilt) - z * Math.sin(tilt);
  const z2 = y * Math.sin(tilt) + z * Math.cos(tilt);
  return { x: CX + x * R, y: CY - y2 * R, z: z2 };
}

// 緯度経度グリッドの点描
for (let lat = -88; lat <= 88; lat += 4) {
  const circ = Math.cos(lat * Math.PI / 180);
  const stepCount = Math.max(6, Math.round(90 * circ));
  for (let i = 0; i < stepCount; i++) {
    const lng = (360 / stepCount) * i - 180;
    const p = project(lat, lng);
    const front = p.z > 0;
    const depth = (p.z + 1) / 2;
    const alpha = front ? 0.18 + depth * 0.5 : 0.05 + depth * 0.12;
    const r = front ? 1.5 + depth * 0.9 : 1.1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(143, 212, 184, ${alpha})`;
    ctx.fill();
  }
}

// 仕向地マーカー（台湾・香港・米国西海岸）と日本（起点）
const marks = [
  { lat: 38.9, lng: 139.8, color: '#f0b95a', size: 6 },  // 酒田
  { lat: 23.7, lng: 120.9, color: '#8fd4b8', size: 5 },  // 台湾
  { lat: 22.3, lng: 114.2, color: '#8fd4b8', size: 5 },  // 香港
  { lat: 37.8, lng: -122.4, color: '#8fd4b8', size: 5 }, // 米国西海岸
];
// 起点→仕向地の弧
function arc(a, b) {
  ctx.beginPath();
  const steps = 60;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const lat = a.lat + (b.lat - a.lat) * t;
    let dLng = b.lng - a.lng;
    if (dLng > 180) dLng -= 360;
    if (dLng < -180) dLng += 360;
    const lng = a.lng + dLng * t;
    const lift = 1 + Math.sin(Math.PI * t) * 0.06;
    const p = project(lat, lng);
    const px = CX + (p.x - CX) * lift;
    const py = CY + (p.y - CY) * lift;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = 'rgba(240, 185, 90, 0.5)';
  ctx.lineWidth = 1.8;
  ctx.stroke();
}
const origin = marks[0];
arc(origin, marks[1]);
arc(origin, marks[2]);

for (const m of marks) {
  const p = project(m.lat, m.lng);
  if (p.z <= 0) continue;
  ctx.beginPath();
  ctx.arc(p.x, p.y, m.size * 2.6, 0, Math.PI * 2);
  ctx.fillStyle = m.color + '22';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(p.x, p.y, m.size, 0, Math.PI * 2);
  ctx.fillStyle = m.color;
  ctx.fill();
}
document.body.dataset.ready = '1';
</script>
</body>
</html>
