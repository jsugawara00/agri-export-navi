name: patrol-notify
# 巡回PR・巡回リマインドの通知係。
# クラウドエージェントの操作は運用者本人の名義になりGitHubがメールを送らないため、
# 別人格の github-actions[bot] が @メンション付きコメントを投稿してメールを保証する。

on:
  pull_request:
    types: [opened]
  schedule:
    - cron: "5 22 * * 0" # 月曜 7:05 JST

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      OPERATOR: jsugawara00
    steps:
      - name: 新しい巡回PRの通知（メンション→メール）
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[patrol]')
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "@${OPERATOR} 巡回PRが起票されました。

■ 承認する場合 → このPRを **Merge**（自動でサイトに反映されます）
■ 相談する場合 → マージせず、手元のClaude Codeで「巡回PRを一緒に確認して」と伝えてください"

      - name: 放置中の巡回PRへ週次リマインド（メンション→メール）
        if: github.event_name == 'schedule'
        run: |
          gh pr list --repo ${{ github.repository }} --state open --json number,title \
            -q '.[] | select(.title | contains("[patrol]")) | .number' | while read -r n; do
            gh pr comment "$n" --repo ${{ github.repository }} --body "@${OPERATOR} 未対応の巡回PRが残っています。

■ 承認する場合 → このPRを **Merge**（自動でサイトに反映されます）
■ 相談する場合 → マージせず、手元のClaude Codeで「巡回PRを一緒に確認して」と伝えてください"
          done

      - name: リポジトリ取得（30日チェック用）
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4

      - name: 巡回30日超のリマインドIssue（メンション→メール）
        if: github.event_name == 'schedule'
        run: |
          last=$(grep -m1 "^generated_at:" ops/patrol-report.md | sed 's/generated_at: *//' | cut -c1-10)
          last_epoch=$(date -d "$last" +%s)
          now_epoch=$(date +%s)
          days=$(( (now_epoch - last_epoch) / 86400 ))
          echo "last patrol: $last ($days days ago)"
          if [ "$days" -lt 30 ]; then exit 0; fi
          title="巡回リマインド: 前回の巡回から30日以上経過"
          exists=$(gh issue list --repo ${{ github.repository }} --state open --json title \
            -q ".[] | select(.title == \"$title\") | .title")
          if [ -n "$exists" ]; then echo "open reminder already exists"; exit 0; fi
          gh issue create --repo ${{ github.repository }} --title "$title" --body "@${OPERATOR} 前回の巡回（$last）から${days}日が経過しています。

手元のClaude Codeで「巡回して」と伝えれば、巡回から修正案PRの起票までが実行されます（外務省系のページは手元PCからしか取得できないため、この操作だけは人の手が必要です）。"
