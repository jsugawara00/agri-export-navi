name: patrol-notify
# 巡回PR・巡回リマインドの通知係。
# クラウドエージェントの操作は運用者本人の名義になりGitHubがメールを送らないため、
# 別人格の github-actions[bot] が @メンション付きコメントを投稿してメールを保証する。

on:
  pull_request:
    types: [opened]
  schedule:
    - cron: "5 22 * * 0" # 月曜 7:05 JST
  workflow_dispatch: # 手動テスト用（scheduleと同じ動きをする）

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      OPERATOR: jsugawara00
    steps:
      - name: 新しい巡回PRの通知（メンション→メール）
        if: github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[patrol]')
        run: |
          {
            echo "@${OPERATOR} 巡回PRが起票されました。"
            echo ""
            echo "■ 承認する場合 → このPRを **Merge**（自動でサイトに反映されます）"
            echo "■ 相談する場合 → マージせず、手元のClaude Codeで「巡回PRを一緒に確認して」と伝えてください"
          } > body.md
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file body.md

      - name: 放置中の巡回PRへ週次リマインド（メンション→メール）
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "@${OPERATOR} 未対応の巡回PRが残っています。"
            echo ""
            echo "■ 承認する場合 → このPRを **Merge**（自動でサイトに反映されます）"
            echo "■ 相談する場合 → マージせず、手元のClaude Codeで「巡回PRを一緒に確認して」と伝えてください"
          } > body.md
          gh pr list --repo ${{ github.repository }} --state open --json number,title \
            --jq '.[] | select(.title | contains("[patrol]")) | .number' | while read -r n; do
            gh pr comment "$n" --repo ${{ github.repository }} --body-file body.md
          done

      - name: リポジトリ取得（30日チェック用）
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: 到達できない情報源をメール通知（サイト閉鎖→代替探索の依頼）
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          dead=$(grep "UNREACHABLE" ops/patrol-report.md || true)
          if [ -z "$dead" ]; then echo "no unreachable sources"; exit 0; fi
          title="巡回リマインド: 到達できない情報源があります（代替探索）"
          exists=$(gh issue list --repo ${{ github.repository }} --state open --json title \
            --jq ".[] | select(.title == \"$title\") | .title")
          if [ -n "$exists" ]; then echo "open reminder already exists"; exit 0; fi
          {
            echo "@${OPERATOR} 前回の巡回で到達できなかった情報源があります（サイト閉鎖・移転の可能性）。"
            echo ""
            echo '```'
            echo "$dead"
            echo '```'
            echo ""
            echo "手元のClaude Codeで「巡回して」と伝えると、代替の公的／公表情報を探して"
            echo "対象mdの source_url を更新する案をPRにします（反映は運用者のMergeで確定）。"
          } > unreachable-body.md
          gh issue create --repo ${{ github.repository }} --title "$title" --body-file unreachable-body.md

      - name: 巡回30日超のリマインドIssue（メンション→メール）
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          last=$(grep -m1 "^generated_at:" ops/patrol-report.md | sed 's/generated_at: *//' | cut -c1-10)
          last_epoch=$(date -d "$last" +%s)
          now_epoch=$(date +%s)
          days=$(( (now_epoch - last_epoch) / 86400 ))
          echo "last patrol: $last ($days days ago)"
          if [ "$days" -lt 30 ]; then exit 0; fi
          title="巡回リマインド: 前回の巡回から30日以上経過"
          exists=$(gh issue list --repo ${{ github.repository }} --state open --json title \
            --jq ".[] | select(.title == \"$title\") | .title")
          if [ -n "$exists" ]; then echo "open reminder already exists"; exit 0; fi
          {
            echo "@${OPERATOR} 前回の巡回（$last）から${days}日が経過しています。"
            echo ""
            echo "手元のClaude Codeで「巡回して」と伝えれば、巡回から修正案PRの起票までが実行されます"
            echo "（外務省系のページは手元PCからしか取得できないため、この操作だけは人の手が必要です）。"
          } > issue-body.md
          gh issue create --repo ${{ github.repository }} --title "$title" --body-file issue-body.md
